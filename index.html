<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commonplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <h1>Commonplace</h1>
      <p class="tagline">A working record of study</p>
    </div>
    <nav id="sectionNav"></nav>
    <button id="addSectionBtn" class="ghost-btn">+ New Section</button>
  </aside>

  <main class="content">

    <!-- LIST VIEW -->
    <div id="listView">
      <header class="content-header">
        <div>
          <h2 id="sectionTitle"></h2>
          <p id="sectionDesc" class="section-desc"></p>
        </div>
        <div class="header-actions">
          <button id="renameSectionBtn" class="ghost-btn">Rename</button>
          <button id="deleteSectionBtn" class="ghost-btn danger">Delete Section</button>
          <button id="addEntryBtn">+ New Entry</button>
        </div>
      </header>

      <details class="reading-list" id="readingList">
        <summary>Reading List &amp; References <span id="refCount" class="ref-count"></span></summary>
        <div id="refItems" class="ref-items"></div>
        <button id="addRefBtn" class="ghost-btn">+ Add Reference</button>
      </details>

      <div id="entryList" class="entry-list"></div>
    </div>

    <!-- READ VIEW -->
    <article id="readView" class="page-view" hidden>
      <div class="page-toolbar">
        <button id="backFromReadBtn" class="ghost-btn">&larr; Back</button>
        <div class="page-toolbar-actions">
          <button id="editEntryBtn" class="ghost-btn">Edit</button>
          <button id="deleteEntryFromReadBtn" class="ghost-btn danger">Delete</button>
        </div>
      </div>
      <h1 id="viewTitle" class="page-title"></h1>
      <p class="entry-meta" id="viewMeta"></p>
      <p id="viewRef" class="entry-ref"></p>
      <div id="viewBody" class="entry-body"></div>
    </article>

    <!-- EDIT VIEW -->
    <div id="editView" class="page-view" hidden>
      <div class="page-toolbar">
        <button id="backFromEditBtn" class="ghost-btn">&larr; Cancel</button>
        <div class="page-toolbar-actions">
          <button id="insertImageBtn" class="ghost-btn">Insert Image</button>
          <button id="saveEntryBtn">Save</button>
        </div>
      </div>
      <input type="hidden" id="sectionId">
      <input type="hidden" id="entryId">
      <input type="text" id="entryTitle" class="title-input" placeholder="Entry title" required>
      <div class="meta-fields">
        <label>Date<input type="date" id="entryDate"></label>
        <label>Tags <span class="hint">(comma separated)</span><input type="text" id="entryTags" placeholder="e.g. Stoicism, Roman history"></label>
        <label>Source / Reference <span class="hint">(book, article, link...)</span><input type="text" id="entryRef"></label>
      </div>
      <div id="entryBody" class="entry-body editable" contenteditable="true" data-placeholder="Write your notes and analysis here..."></div>
      <input type="file" id="imageFileInput" accept="image/*" hidden>
    </div>

  </main>
</div>

<dialog id="sectionDialog">
  <form id="sectionForm">
    <h2 id="sectionDialogTitle">New Section</h2>
    <input type="hidden" id="sectionEditId">
    <label>Name<input type="text" id="sectionName" required placeholder="e.g. Engineering Research"></label>
    <label>Description <span class="hint">(optional)</span><input type="text" id="sectionDescInput" placeholder="What lives in this section?"></label>
    <div class="dialog-actions">
      <button type="button" id="cancelSectionBtn">Cancel</button>
      <button type="submit">Save</button>
    </div>
  </form>
</dialog>

<dialog id="refDialog">
  <form id="refForm">
    <h2 id="refDialogTitle">Add Reference</h2>
    <input type="hidden" id="refId">
    <label>Title<input type="text" id="refTitle" required placeholder="e.g. Meditations, Marcus Aurelius"></label>
    <label>Type<select id="refType">
      <option value="book">Book</option>
      <option value="article">Article</option>
      <option value="paper">Paper</option>
      <option value="topic">Topic to explore</option>
      <option value="other">Other</option>
    </select></label>
    <label>Link <span class="hint">(optional)</span><input type="text" id="refLink" placeholder="https://..."></label>
    <label>Note <span class="hint">(optional)</span><input type="text" id="refNote"></label>
    <div class="dialog-actions">
      <button type="button" id="deleteRefBtn">Delete</button>
      <button type="button" id="cancelRefBtn">Cancel</button>
      <button type="submit">Save</button>
    </div>
  </form>
</dialog>

<script src="app.js"></script>
</body>
</html>
