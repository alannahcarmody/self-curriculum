<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commonplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <h1>Commonplace</h1>
      <p class="tagline">A working record of study</p>
    </div>
    <nav id="sectionNav"></nav>
    <button id="addSectionBtn" class="ghost-btn">+ New Section</button>
  </aside>

  <main class="content">

    <!-- LIST VIEW -->
    <div id="listView">
      <div class="cover-wrap" id="coverWrap" hidden>
        <img id="coverImg" alt="">
        <button id="changeCoverBtn" class="cover-edit-btn">Change cover</button>
        <button id="removeCoverBtn" class="cover-edit-btn cover-remove-btn">Remove</button>
      </div>

      <p id="breadcrumb" class="breadcrumb" hidden></p>

      <header class="content-header">
        <div>
          <h2 id="sectionTitle"></h2>
          <p id="sectionDesc" class="section-desc"></p>
        </div>
        <div class="header-actions">
          <button id="addCoverBtn" class="ghost-btn">+ Cover image</button>
          <button id="addCategoryBtn" class="ghost-btn">+ New Category</button>
          <button id="renameSectionBtn" class="ghost-btn">Rename</button>
          <button id="deleteSectionBtn" class="ghost-btn danger">Delete</button>
          <button id="addEntryBtn">+ New Page</button>
        </div>
      </header>

      <div id="categoryGrid" class="category-grid"></div>

      <div class="toggles">
        <details class="reading-list" id="notesPanel">
          <summary>Plan &amp; Skills <span id="notesIndicator" class="ref-count"></span></summary>
          <p class="ref-block-hint">What guides the work in this section — focus areas, skills to build, things to revisit. One per line.</p>
          <div id="notesDisplay" class="notes-display"></div>
          <textarea id="refNotes" class="ref-notes" rows="4" placeholder="- Build intuition for...&#10;- Revisit...&#10;- Get comfortable with..." hidden></textarea>
        </details>

        <details class="reading-list" id="readingList">
          <summary>Linked References <span id="refCount" class="ref-count"></span></summary>
          <p class="ref-block-hint">Specific books, articles, and papers — hover an item to edit or remove it.</p>
          <div id="refItems" class="ref-items"></div>
          <button id="addRefBtn" class="ghost-btn">+ Add Reference</button>
        </details>
      </div>

      <div id="entryList" class="entry-list"></div>
    </div>

    <!-- PAGE VIEW (Notion-style: click in, write directly) -->
    <div id="pageView" class="page-view" hidden>
      <div class="page-toolbar">
        <button id="backFromPageBtn" class="ghost-btn">&larr; Back</button>
        <div class="page-toolbar-actions">
          <span id="saveIndicator" class="save-indicator"></span>
          <button id="insertImageBtn" class="ghost-btn">Insert Image</button>
          <button id="deleteEntryBtn" class="ghost-btn danger">Delete</button>
        </div>
      </div>
      <input type="hidden" id="sectionId">
      <input type="hidden" id="subsectionId">
      <input type="hidden" id="entryId">
      <input type="text" id="entryTitle" class="title-input" placeholder="Untitled">
      <div class="meta-fields">
        <label>Date<input type="date" id="entryDate"></label>
        <label>Tags <span class="hint">(comma separated)</span><input type="text" id="entryTags" placeholder="e.g. Stoicism, Roman history"></label>
        <label>Source / Reference <span class="hint">(book, article, link...)</span><input type="text" id="entryRef"></label>
      </div>
      <div id="entryBody" class="entry-body editable" contenteditable="true" data-placeholder="Write here..."></div>
    </div>

  </main>
</div>

<input type="file" id="imageFileInput" accept="image/*" hidden>
<input type="file" id="coverFileInput" accept="image/*" hidden>

<div id="undoToast" class="undo-toast" hidden>
  <span id="undoMessage"></span>
  <button id="undoBtn">Undo</button>
</div>

<dialog id="sectionDialog">
  <form id="sectionForm">
    <h2 id="sectionDialogTitle">New Section</h2>
    <input type="hidden" id="sectionEditId">
    <label>Name<input type="text" id="sectionName" required placeholder="e.g. Engineering Research"></label>
    <label>Description <span class="hint">(optional)</span><input type="text" id="sectionDescInput" placeholder="What lives in this section?"></label>
    <div class="dialog-actions">
      <button type="button" id="cancelSectionBtn">Cancel</button>
      <button type="submit">Save</button>
    </div>
  </form>
</dialog>

<dialog id="categoryDialog">
  <form id="categoryForm">
    <h2 id="categoryDialogTitle">New Category</h2>
    <input type="hidden" id="categoryEditId">
    <label>Name<input type="text" id="categoryName" required placeholder="e.g. Thermodynamics"></label>
    <label>Description <span class="hint">(optional)</span><input type="text" id="categoryDescInput" placeholder="What lives in this category?"></label>
    <div class="dialog-actions">
      <button type="button" id="deleteCategoryBtn">Delete</button>
      <button type="button" id="cancelCategoryBtn">Cancel</button>
      <button type="submit">Save</button>
    </div>
  </form>
</dialog>

<dialog id="refDialog">
  <form id="refForm">
    <h2 id="refDialogTitle">Add Reference</h2>
    <input type="hidden" id="refId">
    <label>Title<input type="text" id="refTitle" required placeholder="e.g. Meditations, Marcus Aurelius"></label>
    <label>Type<select id="refType">
      <option value="book">Book</option>
      <option value="article">Article</option>
      <option value="paper">Paper</option>
      <option value="topic">Topic to explore</option>
      <option value="other">Other</option>
    </select></label>
    <label>Link <span class="hint">(optional)</span><input type="text" id="refLink" placeholder="https://..."></label>
    <label>Note <span class="hint">(optional)</span><input type="text" id="refNote"></label>
    <div class="dialog-actions">
      <button type="button" id="deleteRefBtn">Delete</button>
      <button type="button" id="cancelRefBtn">Cancel</button>
      <button type="submit">Save</button>
    </div>
  </form>
</dialog>

<script src="app.js"></script>
</body>
</html>
